name: Deploy on Maven Central

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup settings.xml
        uses: s4u/maven-settings-action@v2.5.0
        with:
          servers: |
            [
               {
                  "id":"sonatype-nexus-snapshots",
                  "username":"${{ secrets.SONATYPE_USER }}",
                  "password":"${{ secrets.SONATYPE_PASSWORD }}"
               },
               {
                  "id":"sonatype-nexus-staging",
                  "username":"${{ secrets.SONATYPE_USER }}",
                  "password":"${{ secrets.SONATYPE_PASSWORD }}"
               }
            ]

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build and Deploy
        run: >
          mvn -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
          -DaltSnapshotDeploymentRepository=sonatype-nexus-snapshots::default::https://s01.oss.sonatype.org/content/repositories/snapshots
          -DaltReleaseDeploymentRepository=sonatype-nexus-staging::default::https://s01.oss.sonatype.org/service/local/staging/deploy/maven2
          -DaltDeploymentRepository=sonatype-nexus-staging::default::https://s01.oss.sonatype.org/service/local/staging/deploy/maven2
          -Pcentral clean deploy